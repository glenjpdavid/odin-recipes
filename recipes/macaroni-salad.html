<h2>Description</h2>
<p>Macaroni salad is a staple dish in the United States, and specifically Hawaii.
    Its main ingrediants are elbow macaroni and mayonnaise. It is usually served as a side dish in Hawaiian plate lucnhes and a side in Thanksgiving dinners.
